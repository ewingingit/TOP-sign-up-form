<!DOCTYPE html>
  <html>
    <head></head>
    <body>

      <form action="#" method="get">
        <div>
          <textarea placeholder="What's happening?" minlength="5" maxlength="20"></textarea>
        </div>
        <button type="submit">Tweet</button>
      </form>

      <form action ="#" method = "get">
        <div>
          <label
            for="quantity">Pigu</label>
        </div>
        <input type="number" id="quantity" name="quantity" min="50" max="100" value="0">

        <div>
          <button type="submit">PLACE</button>
        </div>
      </form>

      <form action="#" method="get">
        <div>
          <label for="zip_code">Postal / Zip Code:</label>
        </div>
      
        <input type="text" id="zip_code" name="zip_code" pattern="(\d{5}([\-]\d{4})?)"
        title="Please enter a valid zip code, example: 65261" placeholder="65261" required>
         
        <div>
          <button type="submit">Submit</button>
        </div>
      </form>
    </body> 
  </html>
